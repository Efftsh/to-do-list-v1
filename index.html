<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Cinzel:wght@400..900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz@0,14..32;1,14..32&family=Lora:ital,wght@0,400..700;1,400..700&family=Playwrite+US+Trad:wght@100..400&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>To-do-list</title>
  </head>
  <body>
    <div class="grid-2-col container">
      <header class="side-nav">
        <nav class="side-nav-content">
          <div class="top-content">
            <h1 class="logo">To-Do-List</h1>
            <p>Turn your plans into checkmarks.</p>
          </div>
          <div class="aesthetic-quote">
            <p>Small tasks today build the life you want tomorrow.</p>
            <p>One task at a time. One step closer to your goals.</p>
          </div>
        </nav>
      </header>

      <main class="list-content">
        <section class="list-area">
          <div class="input-area">
            <input
              type="text"
              name="task-input"
              id="task-input"
              placeholder="Enter task"
              class="task-input"
            />
            <button class="add-task">Add Task</button>
          </div>
          <div class="list">
            <ul class="list-input" id="list">
              <h1>My Task</h1>
            </ul>
          </div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
